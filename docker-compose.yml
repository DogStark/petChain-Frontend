services:
  # 1. NestJS Backend (Skeleton or Real)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: petchain_backend
    restart: unless-stopped
    ports:
      - '3001:4000'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/petchain_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => {if(r.statusCode!==200)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - petchain_network

  # 2. Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petchain_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
    networks:
      - petchain_network

  # 3. Database
  postgres:
    image: postgres:16-alpine
    container_name: petchain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petchain_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petchain_network

  # 4. Redis
  redis:
    image: redis:7-alpine
    container_name: petchain_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - petchain_network

  # 5. Database Admin UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: petchain_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@petchain.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - petchain_network

  # 6. Antivirus
  clamav:
    image: clamav/clamav:latest
    container_name: petchain_clamav
    restart: unless-stopped
    ports:
      - '3310:3310'
    volumes:
      - clamav_data:/var/lib/clamav
    environment:
      CLAMAV_NO_FRESHCLAMD: 'false'
    healthcheck:
      test: ['CMD', 'clamdscan', '--ping', '3']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - petchain_network

volumes:
  postgres_data:
  redis_data:
  clamav_data:

networks:
  petchain_network:
    driver: bridge
