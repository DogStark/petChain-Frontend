apiVersion: apps/v1
kind: Deployment
metadata:
  name: petchain-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petchain-backend
  template:
    metadata:
      labels:
        app: petchain-backend
    spec:
      containers:
      - name: backend
        image: petchain-backend:latest
        # CRITICAL: This line tells K8s to use your local build
        imagePullPolicy: IfNotPresent 
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: petchain-config
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: petchain-backend
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
