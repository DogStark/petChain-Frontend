apiVersion: apps/v1
kind: Deployment
metadata:
  name: petchain-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petchain-frontend
  template:
    metadata:
      labels:
        app: petchain-frontend
    spec:
      containers:
      - name: frontend
        image: petchain-frontend:latest
        # FIX: Prevents K8s from trying to pull from Docker Hub
        imagePullPolicy: IfNotPresent 
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: petchain-config
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: petchain-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  # Note: Use 'LoadBalancer' for cloud or 'NodePort' for local testing
  type: LoadBalancer
