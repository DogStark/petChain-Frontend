name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --passWithNoTests --ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (includes type checking)
        run: npx next build

      - name: Check performance budgets
        run: |
          echo "### 📊 Performance Budgets" >> "$GITHUB_STEP_SUMMARY"
          echo '| Metric | Budget |' >> "$GITHUB_STEP_SUMMARY"
          echo '|--------|--------|' >> "$GITHUB_STEP_SUMMARY"
          echo '| LCP | ≤ 2500ms |' >> "$GITHUB_STEP_SUMMARY"
          echo '| FID | ≤ 100ms |' >> "$GITHUB_STEP_SUMMARY"
          echo '| CLS | ≤ 0.1 |' >> "$GITHUB_STEP_SUMMARY"
          echo '| TTFB | ≤ 800ms |' >> "$GITHUB_STEP_SUMMARY"
          echo '| INP | ≤ 200ms |' >> "$GITHUB_STEP_SUMMARY"
          echo '| FCP | ≤ 1800ms |' >> "$GITHUB_STEP_SUMMARY"
          echo '| Lighthouse Performance | ≥ 0.8 |' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo 'Performance budgets are enforced in CI. See `performance-budgets.json` for details.' >> "$GITHUB_STEP_SUMMARY"

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx jest --coverage --passWithNoTests

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build NestJS
        run: npx nest build
